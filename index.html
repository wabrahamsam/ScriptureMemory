<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scripture Memory Verses — Emmanuel Believers' Fellowship</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #FAF6EE;
    --paper-raised: #FFFDF9;
    --ink: #3A3530;
    --ink-soft: #6B6258;
    --accent: #8B5E3C;
    --hairline: #E3DACB;
    --font-display: 'Source Serif 4', Georgia, serif;
    --font-body: 'Source Sans 3', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); color: var(--ink); font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  body {
    background-image: radial-gradient(circle at 15% 0%, rgba(139,94,60,0.05), transparent 45%),
                       radial-gradient(circle at 85% 100%, rgba(31,111,92,0.04), transparent 45%);
    min-height: 100vh;
  }
  .wrap { max-width: 640px; margin: 0 auto; padding: 48px 20px 100px; }
  header { text-align: center; margin-bottom: 36px; }
  .eyebrow { font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
  h1 { font-family: var(--font-display); font-weight: 700; font-size: clamp(26px, 5vw, 34px); margin: 0 0 8px; letter-spacing: -0.01em; }
  .sub { color: var(--ink-soft); font-size: 14.5px; max-width: 380px; margin: 0 auto; line-height: 1.5; }

  .current-link {
    display: block;
    background: var(--ink);
    color: var(--paper-raised) !important;
    text-decoration: none;
    border-radius: 14px;
    padding: 24px 26px;
    margin-bottom: 32px;
    transition: background 0.15s;
  }
  .current-link:hover { background: var(--accent); }
  .current-link .tag { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; opacity: 0.75; font-weight: 600; }
  .current-link .ref { font-family: var(--font-display); font-size: 21px; font-weight: 700; margin-top: 4px; }
  .current-link .arrow { float: right; opacity: 0.6; }

  .archive-label { font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-soft); font-weight: 600; margin: 0 0 14px 4px; }

  .week-list { display: flex; flex-direction: column; gap: 10px; }
  .week-item {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--paper-raised); border: 1px solid var(--hairline);
    border-radius: 10px; padding: 14px 18px; text-decoration: none; color: var(--ink);
    transition: border-color 0.15s, transform 0.1s;
  }
  .week-item:hover { border-color: var(--accent); transform: translateX(2px); }
  .week-item .dates { font-size: 13px; color: var(--ink-soft); }
  .week-item .ref { font-family: var(--font-display); font-weight: 600; font-size: 16px; }
  .week-item .chev { color: var(--ink-soft); font-size: 14px; }

  footer { text-align: center; margin-top: 50px; padding-top: 18px; border-top: 1px solid var(--hairline); color: var(--ink-soft); font-size: 12px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">Scripture Memory</div>
    <h1>Weekly Verses</h1>
    <p class="sub">One verse a week, memorized in English, Tamil, Malayalam, and Hindi.</p>
  </header>

  <a href="./weeks/current.html" class="current-link" id="currentLink">
    <span class="arrow">→</span>
    <div class="tag">This week</div>
    <div class="ref" id="currentRef">Loading…</div>
  </a>

  <div class="archive-label">Past weeks</div>
  <div class="week-list" id="weekList">
    <!-- populated by manifest.js -->
  </div>

  <footer>Emmanuel Believers' Fellowship · Tenkasi, Tamil Nadu</footer>
</div>

<script src="./manifest.js"></script>
<script>
  if (typeof CURRENT !== 'undefined') {
    document.getElementById('currentRef').textContent = CURRENT.ref;
  }
  if (typeof WEEKS !== 'undefined') {
    const list = document.getElementById('weekList');
    if (WEEKS.length === 0) {
      list.innerHTML = '<p style="color:var(--ink-soft);font-size:14px;padding:8px 4px;">No past weeks yet — check back after this week.</p>';
    } else {
      WEEKS.forEach(w => {
        const a = document.createElement('a');
        a.className = 'week-item';
        a.href = `./weeks/${w.file}`;
        a.innerHTML = `<div><div class="ref">${w.ref}</div><div class="dates">${w.dates}</div></div><div class="chev">→</div>`;
        list.appendChild(a);
      });
    }
  }
</script>
</body>
</html>
